spring:
  application:
    name: mollubook

  datasource:
    url: ${MOLLUBOOK_DB_URL}
    username: ${MOLLUBOOK_DB_USERNAME}
    password: ${MOLLUBOOK_DB_PASSWORD}
    driver-class-name: ${MOLLUBOOK_DB_DRIVER}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  issuer: mollubook
  secret: ${MOLLUBOOK_JWT_SECRET}
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600

encryption:
  secret: ${MOLLUBOOK_ENCRYPTION_SECRET}